spring:
  application:
    name: ai-summarizer
  datasource:
    url: jdbc:postgresql://localhost:5433/summarizer
    username: summarizer
    password: summarizer
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  logging:
    level:
      org.flywaydb: DEBUG
      org.springframework.boot.autoconfigure.flyway: DEBUG
gemini:
  api-key: ${GEMINI_API_KEY}
  base_url: https://generativelanguage.googleapis.com
  model: gemini-2.5-flash-lite

server:
  port: 8080