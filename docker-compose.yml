services:
  postgres:
    image: postgres:16
    container_name: summarizer-postgres
    environment:
      POSTGRES_DB: summarizer
      POSTGRES_USER: summarizer
      POSTGRES_PASSWORD: summarizer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: summarizer-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: